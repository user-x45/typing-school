<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="無料で遊べるひらがな・文章タイピング練習ゲーム。初級から上級までレベルを選んで一人で練習したり、オンライン対戦で全国のプレイヤーとタイピング速度を競えます。">
<meta content="https://s-typing.f5.si/" property="og:url">
<meta content="シンプルタイピング" property="og:title">
<meta content="無料で遊べるひらがな・文章タイピング練習ゲーム。初級から上級までレベルを選んで一人で練習したり、オンライン対戦で全国のプレイヤーとタイピング速度を競えます。" property="og:description">
<meta content="website" property="og:type">
<meta content="シンプルタイピング" property="og:site_name">
<title>シンプルタイピング｜ひらがな・文章タイピング練習ゲーム</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script type="application/ld+json">
{
  "@context": "https://schema.org/",
  "@type": "WebSite",
  "name": "シンプルタイピング",
  "url": "https://s-typing.f5.si/"
}
</script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LSBNPPLE0E"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-LSBNPPLE0E');

<style>
  @import url('https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap');

  :root{
    --washi:#f2ead9;
    --washi-deep:#e7dcc2;
    --ink:#1f1c19;
    --ink-soft:#3a352e;
    --hanko:#a8352a;
    --hanko-deep:#7e2019;
    --gold:#b8933f;
    --line:#c9bb9a;
    --panel-bg:rgba(255,253,246,0.55);
    --panel-bg-soft:rgba(255,253,246,0.5);
    --input-bg:rgba(255,253,246,0.7);
  }

  @media (prefers-color-scheme: dark){
    :root{
      --washi:#1c1a17;
      --washi-deep:#141210;
      --ink:#ece5d6;
      --ink-soft:#c9bfa9;
      --hanko:#d9584a;
      --hanko-deep:#f07264;
      --gold:#d9b45f;
      --line:#4a4438;
      --panel-bg:rgba(40,36,30,0.55);
      --panel-bg-soft:rgba(40,36,30,0.5);
      --input-bg:rgba(40,36,30,0.7);
    }
  }

  *{box-sizing:border-box;}

  html{
    height:100%;
    overflow-x:hidden;
  }

  body{
    margin:0;
    min-height:100vh;
    min-height:100dvh;
    background:
      radial-gradient(circle at 15% 20%, rgba(184,147,63,0.08), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(168,53,42,0.06), transparent 45%),
      var(--washi);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(184,147,63,0.08), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(168,53,42,0.06), transparent 45%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 1px, transparent 1px, transparent 3px),
      var(--washi);
    color:var(--ink);
    font-family:'BIZ UDPGothic', sans-serif;
    line-height:1.5;
    display:flex;
    justify-content:center;
    padding:40px 16px;
  }

  body.game-active{
    padding:16px 16px;
  }

  .stage{
    width:100%;
    max-width:640px;
  }

  header{
    text-align:center;
    margin-bottom:28px;
    position:relative;
  }

  .kicker{
    font-size:12px;
    letter-spacing:0.35em;
    color:var(--gold);
    margin-bottom:6px;
  }

  h1{
    font-family:'BIZ UDPGothic', sans-serif;
    font-weight:800;
    font-size:38px;
    margin:0;
    letter-spacing:0.08em;
    position:relative;
    display:inline-block;
  }

  .custom-alert-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(31,28,25,0.55);
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
  }

  .custom-alert-overlay.visible{
    display:flex;
  }

  .custom-alert-box{
    background:var(--washi);
    border:1px solid var(--line);
    border-radius:4px;
    padding:28px 24px;
    max-width:320px;
    width:100%;
    text-align:center;
    position:relative;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
  }

  .custom-alert-box::before{
    content:"";
    position:absolute;
    inset:6px;
    border:1px solid rgba(31,28,25,0.12);
    border-radius:2px;
    pointer-events:none;
  }

  .custom-alert-message{
    font-size:15px;
    color:var(--ink);
    margin-bottom:22px;
  }

  .custom-alert-btn{
    padding:10px 32px;
    background:var(--hanko);
    color:var(--washi);
    border:none;
    border-radius:3px;
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:14px;
    font-weight:600;
    letter-spacing:0.05em;
    cursor:pointer;
    transition:background 0.2s ease;
  }

  .custom-alert-btn:hover{
    background:var(--hanko-deep);
  }

  .mute-check-label{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-top:16px;
    font-size:13px;
    color:var(--ink-soft);
    cursor:pointer;
  }

  .mute-check{
    width:16px;
    height:16px;
    cursor:pointer;
    accent-color:var(--hanko);
  }

  .end-game-btn{
    padding:6px 12px;
    background:var(--hanko);
    color:var(--washi);
    border:none;
    border-radius:3px;
    cursor:pointer;
    font-size:12px;
    margin-left:10px;
  }

  .panel{
    background:var(--panel-bg);
    border:1px solid var(--line);
    border-radius:4px;
    padding:28px;
    position:relative;
  }

  .panel::before{
    content:"";
    position:absolute;
    inset:6px;
    border:1px solid rgba(31,28,25,0.12);
    border-radius:2px;
    pointer-events:none;
  }

  .mode-tabs{
    display:flex;
    gap:0;
    justify-content:center;
    margin-bottom:22px;
    border:1px solid var(--line);
    border-radius:3px;
    overflow:hidden;
  }

  .mode-btn{
    flex:1;
    padding:11px 8px;
    background:transparent;
    border:none;
    border-right:1px solid var(--line);
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:14px;
    font-weight:600;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all 0.2s ease;
  }

  .mode-btn:last-child{
    border-right:none;
  }

  .mode-btn.active{
    background:var(--hanko);
    color:var(--washi);
  }

  .hidden{
    display:none !important;
  }

  .levels{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:22px;
  }

  .level-btn{
    flex:1;
    padding:14px 8px;
    background:transparent;
    border:1.5px solid var(--line);
    border-radius:3px;
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:15px;
    font-weight:600;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all 0.2s ease;
  }

  .level-btn .sub{
    display:block;
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:11px;
    font-weight:400;
    color:var(--ink-soft);
    opacity:0.6;
    margin-top:4px;
  }

  .level-btn:hover{
    border-color:var(--gold);
  }

  .level-btn.active{
    background:var(--ink);
    border-color:var(--ink);
    color:var(--washi);
  }

  .level-btn.active .sub{
    color:var(--washi);
    opacity:0.75;
  }

  .start-row{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:8px;
  }

  .start-btn{
    padding:12px 32px;
    background:var(--hanko);
    color:var(--washi);
    border:none;
    border-radius:3px;
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:16px;
    font-weight:600;
    letter-spacing:0.1em;
    cursor:pointer;
    transition:background 0.2s ease;
  }

  .start-btn:hover{
    background:var(--hanko-deep);
  }

  .start-btn.online-btn{
    background:var(--ink);
  }

  .start-btn.online-btn:hover{
    background:var(--ink-soft);
  }

  .online-status{
    display:none;
    text-align:center;
    padding:20px 8px;
  }

  .online-status.visible{
    display:block;
  }

  .status-title{
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:18px;
    font-weight:600;
    margin-bottom:10px;
  }

  .search-spinner{
    width:40px;
    height:40px;
    border:3px solid var(--line);
    border-top-color:var(--hanko);
    border-radius:50%;
    margin:20px auto;
    animation:spin 1s linear infinite;
  }

  @keyframes spin{
    to{transform:rotate(360deg);}
  }

  .search-count{
    font-size:20px;
    color:var(--ink-soft);
    margin-bottom:22px;
  }

  .countdown-number{
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:88px;
    font-weight:800;
    color:var(--hanko);
    margin:16px 0 24px;
  }

  #opponent-score-label.hidden{
    display:none;
  }

  .game{
    display:none;
  }

  .game.visible{
    display:block;
  }

  .setup.hidden{
    display:none;
  }

  .hud{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
    font-size:13px;
    color:var(--ink-soft);
    letter-spacing:0.05em;
  }

  .timer-track{
    height:6px;
    width:100%;
    background:rgba(31,28,25,0.1);
    border-radius:4px;
    overflow:hidden;
    margin-bottom:24px;
  }

  .timer-fill{
    height:100%;
    background:linear-gradient(90deg, var(--gold), var(--hanko));
    width:100%;
    transition:width 1s linear;
  }

  .word-frame{
    text-align:center;
    padding:36px 12px;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    margin-bottom:26px;
  }

  .word-eyebrow{
    font-size:11px;
    letter-spacing:0.3em;
    color:var(--gold);
    margin-bottom:12px;
  }

  #word-display{
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:46px;
    font-weight:600;
    letter-spacing:0.12em;
    white-space:nowrap;
    overflow:hidden;
  }

  .char{
    display:inline-block;
    transition:color 0.15s ease;
  }

  .char.done{
    color:var(--hanko);
  }

  .input-row{
    position:relative;
  }

  #typing-input{
    width:100%;
    padding:16px 18px;
    font-size:22px;
    font-family:'BIZ UDPGothic', sans-serif;
    border:1.5px solid var(--line);
    border-radius:3px;
    background:var(--input-bg);
    color:var(--ink);
    outline:none;
    letter-spacing:0.08em;
    transition:border-color 0.15s ease;
  }

  #typing-input:focus{
    border-color:var(--gold);
  }

  #typing-input.shake{
    animation:shake 0.3s ease;
    border-color:var(--hanko-deep);
  }

  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    75%{transform:translateX(6px);}
  }

  .ime-spacer{
    height:0px;
  }

  .hint{
    text-align:center;
    font-size:12px;
    color:var(--ink-soft);
    opacity:0.65;
    margin-top:10px;
    min-height:16px;
  }

  .result{
    display:none;
    text-align:center;
  }

  .result.visible{
    display:block;
  }

  .result-title{
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:14px;
    letter-spacing:0.3em;
    color:var(--gold);
    margin-bottom:6px;
  }

  .result-score{
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:64px;
    font-weight:800;
    color:var(--hanko);
    margin-bottom:4px;
  }

  .result-sub{
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:26px;
  }

  .stat-grid{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:26px;
  }

  .stat-box{
    flex:1;
    max-width:140px;
    padding:14px 8px;
    border:1px solid var(--line);
    border-radius:3px;
    background:var(--panel-bg-soft);
  }

  .stat-value{
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:22px;
    font-weight:800;
    color:var(--ink);
    margin-bottom:4px;
  }

  .stat-label{
    font-size:11px;
    color:var(--ink-soft);
    opacity:0.7;
    letter-spacing:0.05em;
  }

  .ranking-box{
    margin-top:22px;
    padding-top:18px;
    border-top:1px solid var(--line);
  }

  .ranking-title{
    text-align:center;
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:14px;
    font-weight:700;
    letter-spacing:0.1em;
    color:var(--gold);
    margin-bottom:12px;
  }

  .ranking-list{
    list-style:none;
    margin:0;
    padding:0;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px 14px;
    max-height:260px;
    overflow-y:auto;
  }

  .ranking-loading{
    grid-column:1 / -1;
    text-align:center;
    padding:14px 10px;
    font-size:13px;
    color:var(--ink-soft);
    opacity:0.75;
  }

  .ranking-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:6px 10px;
    background:var(--panel-bg-soft);
    border:1px solid var(--line);
    border-radius:3px;
    font-size:13px;
  }

  .ranking-item .rank{
    font-family:'BIZ UDPGothic', sans-serif;
    font-weight:700;
    color:var(--hanko);
  }

  .ranking-item.top3 .rank{
    color:var(--gold);
  }

  .ranking-item .score{
    font-weight:600;
    color:var(--ink);
  }

  .result-rank-badge{
    display:none;
    margin:10px auto 0;
    max-width:280px;
    padding:8px 14px;
    background:var(--hanko);
    color:var(--washi);
    border-radius:3px;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.05em;
    text-align:center;
  }

  .result-rank-badge.visible{
    display:block;
  }

  .high-score-label{
    font-size:12px;
    color:var(--ink-soft);
    opacity:0.8;
  }

  .setup-high-score{
    text-align:center;
    margin-bottom:16px;
  }

  .result-high-score{
    margin-bottom:14px;
  }

  .new-record-badge{
    display:none;
    margin:10px auto 0;
    max-width:280px;
    padding:8px 14px;
    background:var(--gold);
    color:var(--washi);
    border-radius:3px;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.05em;
    text-align:center;
  }

  .new-record-badge.visible{
    display:block;
  }

  .retry-btn{
    padding:12px 36px;
    background:transparent;
    border:1.5px solid var(--ink);
    border-radius:3px;
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:15px;
    color:var(--ink);
    cursor:pointer;
  }

  .retry-btn:hover{
    background:var(--ink);
    color:var(--washi);
  }

  @media (max-width:480px){
    body{padding:24px 10px;}
    body.game-active{padding:10px 10px;}
    .panel{padding:18px 14px;}
    .kicker{font-size:10px;}
    h1{font-size:26px;}

    .mode-btn{font-size:12px;padding:9px 6px;}
    .level-btn{font-size:12px;padding:10px 6px;}
    .level-btn .sub{font-size:9px;}
    .start-btn{font-size:13px;padding:10px 18px;}

    .status-title{font-size:15px;}
    .search-spinner{width:32px;height:32px;}
    .search-count{font-size:16px;}
    .countdown-number{font-size:64px;}

    .hud{font-size:11px;}
    .word-eyebrow{font-size:10px;}
    #word-display{font-size:26px;}
    #typing-input{font-size:16px;padding:12px 14px;}
    .hint{font-size:10px;}

    .result-title{font-size:12px;}
    .result-score{font-size:44px;}
    .result-sub{font-size:11px;}
    .stat-value{font-size:17px;}
    .stat-label{font-size:9px;}
    .retry-btn{font-size:13px;padding:10px 24px;}
  }
</style>
</head>
<body>
<div class="stage">
  <header id="site-header">
    <div class="kicker">SIMPLE TYPING</div>
    <h1>シンプルタイピング</h1>
  </header>

  <div class="panel">

    <div class="setup" id="setup">
      <div class="mode-tabs">
        <button class="mode-btn active" data-mode="hiragana">ひらがな</button>
        <button class="mode-btn" data-mode="sentence">文章</button>
      </div>

      <div class="levels" data-row="hiragana">
        <button class="level-btn active" data-level="beginner">初級<span class="sub">2〜4文字</span></button>
        <button class="level-btn" data-level="intermediate">中級<span class="sub">5〜7文字</span></button>
        <button class="level-btn" data-level="advanced">上級<span class="sub">8文字以上</span></button>
      </div>

      <div class="levels hidden" data-row="sentence">
        <button class="level-btn active" data-level="beginner">初級<span class="sub">10〜12文字</span></button>
        <button class="level-btn" data-level="intermediate">中級<span class="sub">12〜14文字</span></button>
        <button class="level-btn" data-level="advanced">上級<span class="sub">14文字以上</span></button>
      </div>

      <div class="high-score-label setup-high-score" id="setup-high-score">ハイスコア 0</div>

      <div class="start-row">
        <button class="start-btn" id="start-btn">ひとりで練習</button>
        <button class="start-btn online-btn" id="start-online-btn">オンライン対戦</button>
      </div>

      <label class="mute-check-label">
        <input type="checkbox" id="mute-btn" class="mute-check">
        ミュート
      </label>

      <div class="ranking-box hidden" id="ranking-box">
        <div class="ranking-title"><i class="fas fa-trophy"></i> ランキング TOP20（総合スコア）</div>
        <ol class="ranking-list" id="ranking-list"></ol>
      </div>
    </div>

    <div class="online-status" id="searching">
      <div class="status-title">対戦相手をさがしています</div>
      <div class="search-spinner"></div>
      <div class="search-count" id="search-count-label">残り 15 秒</div>
      <button class="retry-btn" id="cancel-search-btn">キャンセル</button>
    </div>

    <div class="online-status" id="countdown">
      <div class="countdown-number" id="countdown-number">3</div>
    </div>

    <div class="game" id="game">
      <div class="hud">
        <span id="score-label">せいかい 0 もん</span>
        <span id="opponent-score-label" class="hidden">あいて 0 もん</span>
        <span id="time-label">残り 100 秒</span>
        <button id="end-game-btn" class="end-game-btn">終了</button>
      </div>
      <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>

      <div class="word-frame">
        <div class="word-eyebrow" id="level-label">初級</div>
        <div id="word-display"></div>
      </div>

      <div class="ime-spacer" id="ime-spacer"></div>

      <div class="input-row">
        <input type="text" id="typing-input" autocomplete="off" placeholder="ここに入力してください">
      </div>
      <div class="hint" id="hint-label">Enterで確定</div>
    </div>

    <div class="result" id="result">
      <div class="result-title">RESULT</div>
      <div class="result-score" id="result-score">0</div>
      <div class="result-sub" id="result-sub">総合スコア</div>
      <div class="result-rank-badge" id="result-rank-badge"></div>
      <div class="high-score-label result-high-score" id="result-high-score">ハイスコア 0</div>
      <div class="new-record-badge" id="new-record-badge">ハイスコア更新！</div>
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-value" id="stat-accuracy">0%</div>
          <div class="stat-label">正誤率</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="stat-speed">0</div>
          <div class="stat-label">文字/分</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="stat-miss">0</div>
          <div class="stat-label">ミス数</div>
        </div>
      </div>
      <button class="retry-btn" id="retry-btn">もう一度</button>
    </div>

  </div>

function getHighScoreKey(mode, level){
  return `highScore_${mode}_${level}`;
}

function getHighScore(mode, level){
  const value = localStorage.getItem(getHighScoreKey(mode, level));
  return value ? parseInt(value, 10) : 0;
}

function setHighScore(mode, level, newScore){
  localStorage.setItem(getHighScoreKey(mode, level), String(newScore));
}

function updateSetupHighScore(){
  setupHighScoreEl.textContent = `ハイスコア ${getHighScore(currentMode, currentLevel)}`;
}

let rankingRequestId = 0;

function renderRanking(scores){
  if(!Array.isArray(scores) || scores.length === 0){
    rankingBoxEl.classList.add("hidden");
    rankingListEl.innerHTML = "";
    return;
  }
  rankingListEl.innerHTML = scores.map((s, i) => {
    const rank = i + 1;
    return `<li class="ranking-item${rank <= 3 ? " top3" : ""}"><span class="rank">${rank}位</span><span class="score">${s}</span></li>`;
  }).join("");
  rankingBoxEl.classList.remove("hidden");
}

async function loadRanking(){
  const requestId = ++rankingRequestId;
  const mode = currentMode;
  const level = currentLevel;
  const modeLabel = mode === "sentence" ? "文章" : "ひらがな";
  rankingTitleEl.innerHTML = `<i class="fas fa-trophy"></i> ランキング TOP20（${modeLabel}・${levelLabels[level]}）`;
  rankingBoxEl.classList.add("hidden");
  rankingListEl.innerHTML = "";
  try{
    const res = await fetch(`${RANKING_API_URL}/ranking?mode=${mode}&level=${level}`);
    if(requestId !== rankingRequestId) return;
    if(!res.ok){
      rankingBoxEl.classList.add("hidden");
      rankingListEl.innerHTML = "";
      return;
    }
    const scores = await res.json();
    if(requestId !== rankingRequestId) return;
    renderRanking(scores);
  }catch(e){
    if(requestId !== rankingRequestId) return;
    rankingBoxEl.classList.add("hidden");
    rankingListEl.innerHTML = "";
  }
}

async function submitScoreToRanking(score, mode, level){
  try{
    const res = await fetch(`${RANKING_API_URL}/ranking?mode=${mode}&level=${level}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ score })
    });
    if(!res.ok) return;
    const data = await res.json();
    if(mode === currentMode && level === currentLevel){
      renderRanking(data.top20);
    }
    if(data.rank){
      resultRankBadgeEl.innerHTML = `<i class="fas fa-trophy"></i> ランキング ${data.rank}位にランクインしました！`;
      resultRankBadgeEl.classList.add("visible");
    }
  }catch(e){
  }
}

loadRanking();


let ws = null;
let matchId = null;
let myRole = null;
let isOnlineMode = false;
let onlineWordDeck = [];
let onlineIndex = 0;
let onlineScore = 0;
let onlineMiss = 0;
let onlineChars = 0;
let opponentScore = 0;
let searchCountdownTimer = null;
let onlineTimerId = null;
let onlineTimeLeft = 100;
let countdownTimerId = null;

function fitSpacerToViewport(){
  imeSpacerEl.style.height = "0px";
  requestAnimationFrame(() => {
    const contentHeight = document.documentElement.scrollHeight;
    const available = window.innerHeight - contentHeight;
    imeSpacerEl.style.height = `${Math.max(0, available)}px`;
  });
}

window.addEventListener("resize", fitSpacerToViewport);
window.addEventListener("resize", fitWordDisplayFontSize);

document.querySelectorAll(".mode-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentMode = btn.dataset.mode;
    currentLevel = "beginner";
    document.querySelectorAll(".levels").forEach(row => {
      row.classList.toggle("hidden", row.dataset.row !== currentMode);
      row.querySelectorAll(".level-btn").forEach((lb, i) => {
        lb.classList.toggle("active", i === 0);
      });
    });
    loadRanking();
    updateUrlHash();
    updateSetupHighScore();
  });
});

document.querySelectorAll(".levels").forEach(row => {
  row.querySelectorAll(".level-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      row.querySelectorAll(".level-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentLevel = btn.dataset.level;
      loadRanking();
      updateUrlHash();
      updateSetupHighScore();
    });
  });
});

function updateUrlHash(){
  if(currentMode === "hiragana" && currentLevel === "beginner"){
    history.replaceState(null, "", window.location.pathname + window.location.search);
  } else {
    window.location.hash = `${currentMode}-${currentLevel}`;
  }
}

function applyStateFromHash(){
  const hash = window.location.hash.replace("#", "");
  const validModes = ["hiragana", "sentence"];
  const validLevels = ["beginner", "intermediate", "advanced"];
  const [mode, level] = hash.split("-");

  if(hash && validModes.includes(mode) && validLevels.includes(level)){
    currentMode = mode;
    currentLevel = level;
  } else {
    currentMode = "hiragana";
    currentLevel = "beginner";
  }

  document.querySelectorAll(".mode-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.mode === currentMode);
  });

  document.querySelectorAll(".levels").forEach(row => {
    row.classList.toggle("hidden", row.dataset.row !== currentMode);
    row.querySelectorAll(".level-btn").forEach(lb => {
      lb.classList.toggle("active", lb.dataset.level === currentLevel);
    });
  });

  loadRanking();
  updateSetupHighScore();
}

applyStateFromHash();
window.addEventListener("hashchange", applyStateFromHash);

document.getElementById("start-btn").addEventListener("click", startGame);
document.getElementById("start-online-btn").addEventListener("click", startOnlineSearch);
cancelSearchBtn.addEventListener("click", cancelSearch);
document.getElementById("retry-btn").addEventListener("click", () => {
  resultEl.classList.remove("visible");
  setupEl.classList.remove("hidden");
});

function startOnlineSearch(){
  setupEl.classList.add("hidden");
  searchingEl.classList.add("visible");
  let secondsLeft = 15;
  searchCountLabelEl.textContent = `残り ${secondsLeft} 秒`;
  ws = new WebSocket(`${ONLINE_SERVER_URL}/lobby?mode=${currentMode}&level=${currentLevel}`);
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if(msg.type === "matched"){
      clearInterval(searchCountdownTimer);
      matchId = msg.matchId;
      myRole = msg.role;
      connectToMatch();
    } else if(msg.type === "timeout"){
      clearInterval(searchCountdownTimer);
      cancelSearch();
      showCustomAlert("対戦相手が見つかりませんでした");
    }
  };
  ws.onerror = () => {
    clearInterval(searchCountdownTimer);
    cancelSearch();
    showCustomAlert("サーバーに接続できませんでした");
  };
  searchCountdownTimer = setInterval(() => {
    secondsLeft--;
    searchCountLabelEl.textContent = `残り ${secondsLeft} 秒`;
    if(secondsLeft <= 0){
      clearInterval(searchCountdownTimer);
    }
  }, 1000);
}

function cancelSearch(){
  if(ws){ ws.close(); ws = null; }
  clearInterval(searchCountdownTimer);
  searchingEl.classList.remove("visible");
  setupEl.classList.remove("hidden");
}

function connectToMatch(){
  if(ws) ws.close();
  ws = new WebSocket(`${ONLINE_SERVER_URL}/match/${matchId}?role=${myRole}&mode=${currentMode}&level=${currentLevel}`);
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if(msg.type === "start"){
      onlineWordDeck = msg.wordDeck;
      startOnlineCountdown();
    } else if(msg.type === "opponentProgress"){
      opponentScore = msg.score;
      updateOpponentHud();
    } else if(msg.type === "end"){
      finishOnlineGame(msg);
    } else if(msg.type === "opponentLeft"){
      finishOnlineGame({
        you:{score:onlineScore, miss:onlineMiss},
        opponent:{score:opponentScore, miss:0},
        result:"win",
        forfeit:true
      });
    }
  };
}

function startOnlineCountdown(){
  searchingEl.classList.remove("visible");
  countdownEl.classList.add("visible");
  let count = 3;
  countdownNumberEl.textContent = count;
  clearInterval(countdownTimerId);
  countdownTimerId = setInterval(() => {
    count--;
    if(count > 0){
      countdownNumberEl.textContent = count;
    } else {
      clearInterval(countdownTimerId);
      countdownEl.classList.remove("visible");
      beginOnlineMatch();
    }
  }, 1000);
}

function beginOnlineMatch(){
  isOnlineMode = true;
  onlineIndex = 0;
  onlineScore = 0;
  onlineMiss = 0;
  onlineChars = 0;
  opponentScore = 0;
  onlineTimeLeft = 100;
  gameEl.classList.add("visible");
  headerEl.classList.add("hidden");
  document.body.classList.add("game-active");
  opponentScoreLabelEl.classList.remove("hidden");
  endGameBtn.classList.add("hidden");
  const modeLabel = currentMode === "sentence" ? "文章" : "ひらがな";
  levelLabelEl.textContent = `${modeLabel}・${levelLabels[currentLevel]}（オンライン）`;
  scoreLabelEl.textContent = `せいかい 0 もん`;
  timeLabelEl.textContent = `残り 100 秒`;
  timerFillEl.style.width = "100%";
  updateOpponentHud();
  currentWord = onlineWordDeck[0];
  renderWord();
  inputEl.value = "";
  inputEl.classList.remove("shake");
  hintLabelEl.textContent = "Enterで確定";
  fitSpacerToViewport();
  inputEl.focus();
  clearInterval(onlineTimerId);
  onlineTimerId = setInterval(() => {
    onlineTimeLeft--;
    timeLabelEl.textContent = `残り ${onlineTimeLeft} 秒`;
    timerFillEl.style.width = `${(onlineTimeLeft / 100) * 100}%`;
    if(onlineTimeLeft <= 0){
      clearInterval(onlineTimerId);
      if(ws && ws.readyState === WebSocket.OPEN){
        ws.send(JSON.stringify({type:"finished", score:onlineScore, miss:onlineMiss}));
      }
    }
  }, 1000);
}

function updateOpponentHud(){
  opponentScoreLabelEl.textContent = `あいて ${opponentScore} もん`;
}

function handleOnlineSubmit(typed){
  if(typed !== currentWord){
    onlineMiss++;
    hintLabelEl.textContent = "まだ違います";
    shakeInput();
    playSound(incorrectSoundEl);
    return;
  }
  onlineScore++;
  onlineChars += currentWord.length;
  onlineIndex++;
  currentWord = onlineWordDeck[onlineIndex % onlineWordDeck.length];
  scoreLabelEl.textContent = `せいかい ${onlineScore} もん`;
  renderWord();
  inputEl.value = "";
  inputEl.classList.remove("shake");
  hintLabelEl.textContent = "Enterで確定";
  fitSpacerToViewport();
  playSound(correctSoundEl);
  if(ws && ws.readyState === WebSocket.OPEN){
    ws.send(JSON.stringify({type:"progress", score:onlineScore, index:onlineIndex}));
  }
}

function finishOnlineGame(msg){
  clearInterval(onlineTimerId);
  clearInterval(countdownTimerId);
  countdownEl.classList.remove("visible");
  isOnlineMode = false;
  gameEl.classList.remove("visible");
  headerEl.classList.remove("hidden");
  document.body.classList.remove("game-active");
  opponentScoreLabelEl.classList.add("hidden");
  endGameBtn.classList.remove("hidden");
  resultEl.classList.add("visible");
  const you = msg.you;
  const opponent = msg.opponent;
  const attempts = you.score + you.miss;
  const accuracy = attempts === 0 ? 0 : Math.round((you.score / attempts) * 100);
  const speed = Math.round((onlineChars / 100) * 60);
  let resultLabel = "ひきわけ";
  if(msg.result === "win") resultLabel = msg.forfeit ? "不戦勝" : "しょうり";
  else if(msg.result === "lose") resultLabel = "はいせん";
  resultScoreEl.textContent = resultLabel;
  const modeLabel = currentMode === "sentence" ? "文章" : "ひらがな";
  resultSubEl.textContent = `${modeLabel}・${levelLabels[currentLevel]}（オンライン）/ あなた ${you.score}もん・あいて ${opponent.score}もん`;
  statAccuracyEl.textContent = `${accuracy}%`;
  statSpeedEl.textContent = speed;
  statMissEl.textContent = you.miss;
  if(ws){ ws.close(); ws = null; }
}

function pickWord(){
  const pool = wordBank[currentMode][currentLevel];
  let candidates = pool.filter(w => !usedWords.includes(w));
  if(candidates.length === 0){
    usedWords = [];
    candidates = pool;
  }
  const word = candidates[Math.floor(Math.random() * candidates.length)];
  usedWords.push(word);
  return word;
}

function renderWord(){
  wordDisplayEl.innerHTML = currentWord.split("").map(c => `<span class="char">${c}</span>`).join("");
  fitWordDisplayFontSize();
}

function fitWordDisplayFontSize(){
  const baseSize = parseFloat(getComputedStyle(wordDisplayEl).fontSize);
  const minSize = 12;
  let size = baseSize;
  wordDisplayEl.style.fontSize = "";
  while(wordDisplayEl.scrollWidth > wordDisplayEl.clientWidth && size > minSize){
    size -= 1;
    wordDisplayEl.style.fontSize = `${size}px`;
  }
}

function updateProgressHighlight(typed){
  const chars = wordDisplayEl.querySelectorAll(".char");
  let stillCorrect = true;
  chars.forEach((el, i) => {
    if(stillCorrect && i < typed.length && typed[i] === currentWord[i]){
      el.classList.add("done");
    } else {
      stillCorrect = false;
      el.classList.remove("done");
    }
  });
}

function nextWord(){
  currentWord = pickWord();
  renderWord();
  inputEl.value = "";
  inputEl.classList.remove("shake");
  hintLabelEl.textContent = "Enterで確定";
  fitSpacerToViewport();
}

function startGame(){
  setupEl.classList.add("hidden");
  resultEl.classList.remove("visible");
  gameEl.classList.add("visible");
  headerEl.classList.add("hidden");
  document.body.classList.add("game-active");
  endGameBtn.classList.remove("hidden");
  fitSpacerToViewport();
  const modeLabel = currentMode === "sentence" ? "文章" : "ひらがな";
  levelLabelEl.textContent = `${modeLabel}・${levelLabels[currentLevel]}`;
  score = 0;
  missCount = 0;
  totalCharsTyped = 0;
  timeLeft = 100;
  usedWords = [];
  resultRankBadgeEl.classList.remove("visible");
  resultRankBadgeEl.textContent = "";
  newRecordBadgeEl.classList.remove("visible");
  scoreLabelEl.textContent = `せいかい 0 もん`;
  timeLabelEl.textContent = `残り 100 秒`;
  timerFillEl.style.width = "100%";
  nextWord();
  inputEl.focus();
  clearInterval(timerId);
  timerId = setInterval(() => {
    timeLeft--;
    timeLabelEl.textContent = `残り ${timeLeft} 秒`;
    timerFillEl.style.width = `${(timeLeft / 100) * 100}%`;
    if(timeLeft <= 0){
      endGame(true);
    }
  }, 1000);
}

function endGame(isNormalEnd){
  clearInterval(timerId);
  gameEl.classList.remove("visible");
  headerEl.classList.remove("hidden");
  document.body.classList.remove("game-active");
  if(isNormalEnd){
    resultEl.classList.add("visible");

    const attempts = score + missCount;
    const accuracy = attempts === 0 ? 0 : Math.round((score / attempts) * 100);
    const speed = Math.round((totalCharsTyped / 100) * 60);
    const finalScore = Math.max(0, Math.round(score * 100 + speed * 2 - missCount * 30));

    resultScoreEl.textContent = finalScore;
    const modeLabel = currentMode === "sentence" ? "文章" : "ひらがな";
    resultSubEl.textContent = `${modeLabel}・${levelLabels[currentLevel]} / ${score}もん せいかい`;
    statAccuracyEl.textContent = `${accuracy}%`;
    statSpeedEl.textContent = speed;
    statMissEl.textContent = missCount;

    const previousHighScore = getHighScore(currentMode, currentLevel);
    if(finalScore > previousHighScore){
      setHighScore(currentMode, currentLevel, finalScore);
      resultHighScoreEl.textContent = `ハイスコア ${finalScore}`;
      newRecordBadgeEl.classList.add("visible");
    } else {
      resultHighScoreEl.textContent = `ハイスコア ${previousHighScore}`;
      newRecordBadgeEl.classList.remove("visible");
    }
    updateSetupHighScore();

    if(finalScore > 0){
      submitScoreToRanking(finalScore, currentMode, currentLevel);
    }
  } else {
    setupEl.classList.remove("hidden");
  }
}

const endGameBtn = document.getElementById("end-game-btn");
endGameBtn.addEventListener("click", () => {
  if(isOnlineMode) return;
  endGame(false);
});

document.addEventListener("keydown", (e) => {
  if(e.key === "Escape" && gameEl.classList.contains("visible")){
    if(isOnlineMode) return;
    endGame(false);
  }
});

function shakeInput(){
  inputEl.classList.remove("shake");
  void inputEl.offsetWidth;
  inputEl.classList.add("shake");
}

inputEl.addEventListener("compositionstart", () => { isComposing = true; });
inputEl.addEventListener("compositionend", () => {
  setTimeout(() => { isComposing = false; }, 0);
});

inputEl.addEventListener("input", () => {
  updateProgressHighlight(inputEl.value);
  inputEl.classList.remove("shake");
  hintLabelEl.textContent = "Enterで確定";
});

inputEl.addEventListener("keydown", (e) => {
  if(e.key !== "Enter") return;
  if(isComposing || e.isComposing || e.keyCode === 229) return;
  e.preventDefault();

  const typed = inputEl.value.trim();

  if(isOnlineMode){
    handleOnlineSubmit(typed);
    return;
  }

  if(typed !== currentWord){
    missCount++;
    hintLabelEl.textContent = "まだ違います";
    shakeInput();
    playSound(incorrectSoundEl);
    return;
  }

  score++;
  totalCharsTyped += currentWord.length;
  scoreLabelEl.textContent = `せいかい ${score} もん`;
  playSound(correctSoundEl);
  nextWord();
});
</script>
</body>
</html>
