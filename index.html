<style>
  @import url('https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap');

  :root{
    --washi:#f2ead9;
    --washi-deep:#e7dcc2;
    --ink:#1f1c19;
    --ink-soft:#3a352e;
    --hanko:#a8352a;
    --hanko-deep:#7e2019;
    --gold:#b8933f;
    --line:#c9bb9a;
    --panel-bg:rgba(255,253,246,0.55);
    --panel-bg-soft:rgba(255,253,246,0.5);
    --input-bg:rgba(255,253,246,0.7);
  }

  @media (prefers-color-scheme: dark){
    :root{
      --washi:#1c1a17;
      --washi-deep:#141210;
      --ink:#ece5d6;
      --ink-soft:#c9bfa9;
      --hanko:#d9584a;
      --hanko-deep:#f07264;
      --gold:#d9b45f;
      --line:#4a4438;
      --panel-bg:rgba(40,36,30,0.55);
      --panel-bg-soft:rgba(40,36,30,0.5);
      --input-bg:rgba(40,36,30,0.7);
    }
  }

  *{box-sizing:border-box;}

  html{
    height:100%;
    overflow-x:hidden;
  }

  body{
    margin:0;
    min-height:100vh;
    min-height:100dvh;
    background:
      radial-gradient(circle at 15% 20%, rgba(184,147,63,0.08), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(168,53,42,0.06), transparent 45%),
      var(--washi);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(184,147,63,0.08), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(168,53,42,0.06), transparent 45%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 1px, transparent 1px, transparent 3px),
      var(--washi);
    color:var(--ink);
    font-family:'BIZ UDPGothic', sans-serif;
    line-height:1.5;
    display:flex;
    justify-content:center;
    padding:40px 16px;
  }

  body.game-active{
    padding:16px 16px;
  }

  .stage{
    width:100%;
    max-width:640px;
  }

  .menu-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:nowrap;
    margin-bottom:20px;
    padding:12px 20px;
    background:var(--panel-bg);
    border:1px solid var(--line);
    border-radius:4px;
    white-space:nowrap;
    overflow:hidden;
  }

  .menu-title{
    font-family:'BIZ UDPGothic', sans-serif;
    font-weight:800;
    font-size:20px;
    letter-spacing:0.06em;
    color:var(--ink);
    flex-shrink:0;
  }

  .menu-auth{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:nowrap;
    flex-shrink:1;
    min-width:0;
  }

  .google-btn-container{
    position:absolute;
    width:1px;
    height:1px;
    overflow:hidden;
    opacity:0.01;
    pointer-events:none;
  }

  .custom-alert-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(31,28,25,0.55);
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
  }

  .custom-alert-overlay.visible{
    display:flex;
  }

  .custom-alert-box{
    background:var(--washi);
    border:1px solid var(--line);
    border-radius:4px;
    padding:28px 24px;
    max-width:320px;
    width:100%;
    text-align:center;
    position:relative;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
  }

  .custom-alert-box::before{
    content:"";
    position:absolute;
    inset:6px;
    border:1px solid rgba(31,28,25,0.12);
    border-radius:2px;
    pointer-events:none;
  }

  .custom-alert-message{
    font-size:15px;
    color:var(--ink);
    margin-bottom:22px;
  }

  .custom-alert-btn{
    padding:10px 32px;
    background:var(--hanko);
    color:var(--washi);
    border:none;
    border-radius:3px;
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:14px;
    font-weight:600;
    letter-spacing:0.05em;
    cursor:pointer;
    transition:background 0.2s ease;
  }

  .custom-alert-btn:hover{
    background:var(--hanko-deep);
  }

  .player-name-label{
    font-size:13px;
    color:var(--ink-soft);
    flex-shrink:0;
  }

  .switch-player-btn{
    padding:6px 14px;
    background:transparent;
    border:1.5px solid var(--line);
    border-radius:3px;
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:12px;
    font-weight:600;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all 0.2s ease;
    white-space:nowrap;
    flex-shrink:0;
  }

  .switch-player-btn:hover{
    border-color:var(--gold);
    color:var(--ink);
  }

  .mute-check-label{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-top:16px;
    font-size:13px;
    color:var(--ink-soft);
    cursor:pointer;
  }

  .mute-check{
    width:16px;
    height:16px;
    cursor:pointer;
    accent-color:var(--hanko);
  }

  .end-game-btn{
    padding:6px 12px;
    background:var(--hanko);
    color:var(--washi);
    border:none;
    border-radius:3px;
    cursor:pointer;
    font-size:12px;
    margin-left:10px;
  }

  .panel{
    background:var(--panel-bg);
    border:1px solid var(--line);
    border-radius:4px;
    padding:28px;
    position:relative;
  }

  .panel::before{
    content:"";
    position:absolute;
    inset:6px;
    border:1px solid rgba(31,28,25,0.12);
    border-radius:2px;
    pointer-events:none;
  }

  .mode-tabs{
    display:flex;
    gap:0;
    justify-content:center;
    margin-bottom:22px;
    border:1px solid var(--line);
    border-radius:3px;
    overflow:hidden;
  }

  .mode-btn{
    flex:1;
    padding:11px 8px;
    background:transparent;
    border:none;
    border-right:1px solid var(--line);
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:14px;
    font-weight:600;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all 0.2s ease;
  }

  .mode-btn:last-child{
    border-right:none;
  }

  .mode-btn.active{
    background:var(--hanko);
    color:var(--washi);
  }

  .hidden{
    display:none !important;
  }

  .levels{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:22px;
  }

  .level-btn{
    flex:1;
    padding:14px 8px;
    background:transparent;
    border:1.5px solid var(--line);
    border-radius:3px;
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:15px;
    font-weight:600;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all 0.2s ease;
  }

  .level-btn .sub{
    display:block;
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:11px;
    font-weight:400;
    color:var(--ink-soft);
    opacity:0.6;
    margin-top:4px;
  }

  .level-btn:hover{
    border-color:var(--gold);
  }

  .level-btn.active{
    background:var(--ink);
    border-color:var(--ink);
    color:var(--washi);
  }

  .level-btn.active .sub{
    color:var(--washi);
    opacity:0.75;
  }

  .start-row{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:8px;
  }

  .start-btn{
    padding:12px 32px;
    background:var(--hanko);
    color:var(--washi);
    border:none;
    border-radius:3px;
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:16px;
    font-weight:600;
    letter-spacing:0.1em;
    cursor:pointer;
    transition:background 0.2s ease;
  }

  .start-btn:hover{
    background:var(--hanko-deep);
  }

  .start-btn.online-btn{
    background:var(--ink);
  }

  .start-btn.online-btn:hover{
    background:var(--ink-soft);
  }

  .online-status{
    display:none;
    text-align:center;
    padding:20px 8px;
  }

  .online-status.visible{
    display:block;
  }

  .status-title{
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:18px;
    font-weight:600;
    margin-bottom:10px;
  }

  .search-spinner{
    width:40px;
    height:40px;
    border:3px solid var(--line);
    border-top-color:var(--hanko);
    border-radius:50%;
    margin:20px auto;
    animation:spin 1s linear infinite;
  }

  @keyframes spin{
    to{transform:rotate(360deg);}
  }

  .search-count{
    font-size:20px;
    color:var(--ink-soft);
    margin-bottom:22px;
  }

  .countdown-number{
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:88px;
    font-weight:800;
    color:var(--hanko);
    margin:16px 0 24px;
  }

  #opponent-score-label.hidden{
    display:none;
  }

  .game{
    display:none;
  }

  .game.visible{
    display:block;
  }

  .setup.hidden{
    display:none;
  }

  .hud{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
    font-size:13px;
    color:var(--ink-soft);
    letter-spacing:0.05em;
  }

  .timer-track{
    height:6px;
    width:100%;
    background:rgba(31,28,25,0.1);
    border-radius:4px;
    overflow:hidden;
    margin-bottom:24px;
  }

  .timer-fill{
    height:100%;
    background:linear-gradient(90deg, var(--gold), var(--hanko));
    width:100%;
    transition:width 1s linear;
  }

  .word-frame{
    text-align:center;
    padding:36px 12px;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    margin-bottom:26px;
  }

  .word-eyebrow{
    font-size:11px;
    letter-spacing:0.3em;
    color:var(--gold);
    margin-bottom:12px;
  }

  #word-display{
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:46px;
    font-weight:600;
    letter-spacing:0.12em;
    white-space:nowrap;
    overflow:hidden;
  }

  .char{
    display:inline-block;
    transition:color 0.15s ease;
  }

  .char.done{
    color:var(--hanko);
  }

  .input-row{
    position:relative;
  }

  #typing-input{
    width:100%;
    padding:16px 18px;
    font-size:22px;
    font-family:'BIZ UDPGothic', sans-serif;
    border:1.5px solid var(--line);
    border-radius:3px;
    background:var(--input-bg);
    color:var(--ink);
    outline:none;
    letter-spacing:0.08em;
    transition:border-color 0.15s ease;
  }

  #typing-input:focus{
    border-color:var(--gold);
  }

  #typing-input.shake{
    animation:shake 0.3s ease;
    border-color:var(--hanko-deep);
  }

  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    75%{transform:translateX(6px);}
  }

  .ime-spacer{
    height:0px;
  }

  .hint{
    text-align:center;
    font-size:12px;
    color:var(--ink-soft);
    opacity:0.65;
    margin-top:10px;
    min-height:16px;
  }

  .result{
    display:none;
    text-align:center;
  }

  .result.visible{
    display:block;
  }

  .result-title{
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:14px;
    letter-spacing:0.3em;
    color:var(--gold);
    margin-bottom:6px;
  }

  .result-score{
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:64px;
    font-weight:800;
    color:var(--hanko);
    margin-bottom:4px;
  }

  .result-sub{
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:26px;
  }

  .stat-grid{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:26px;
  }

  .stat-box{
    flex:1;
    max-width:140px;
    padding:14px 8px;
    border:1px solid var(--line);
    border-radius:3px;
    background:var(--panel-bg-soft);
  }

  .stat-value{
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:22px;
    font-weight:800;
    color:var(--ink);
    margin-bottom:4px;
  }

  .stat-label{
    font-size:11px;
    color:var(--ink-soft);
    opacity:0.7;
    letter-spacing:0.05em;
  }

  .ranking-box{
    margin-top:22px;
    padding-top:18px;
    border-top:1px solid var(--line);
  }

  .ranking-title{
    text-align:center;
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:14px;
    font-weight:700;
    letter-spacing:0.1em;
    color:var(--gold);
    margin-bottom:12px;
  }

  .ranking-list{
    list-style:none;
    margin:0;
    padding:0;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px 14px;
    max-height:260px;
    overflow-y:auto;
  }

  .ranking-loading{
    grid-column:1 / -1;
    text-align:center;
    padding:14px 10px;
    font-size:13px;
    color:var(--ink-soft);
    opacity:0.75;
  }

  .ranking-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:6px 10px;
    background:var(--panel-bg-soft);
    border:1px solid var(--line);
    border-radius:3px;
    font-size:13px;
  }

  .ranking-item .rank{
    font-family:'BIZ UDPGothic', sans-serif;
    font-weight:700;
    color:var(--hanko);
  }

  .ranking-item.top3 .rank{
    color:var(--gold);
  }

  .ranking-item .name{
    flex:1;
    margin:0 8px;
    color:var(--ink-soft);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .ranking-item .score{
    font-weight:600;
    color:var(--ink);
  }

  .name-input-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(31,28,25,0.55);
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
  }

  .name-input-overlay.visible{
    display:flex;
  }

  .name-input-box{
    background:var(--washi);
    border:1px solid var(--line);
    border-radius:4px;
    padding:28px 24px;
    max-width:320px;
    width:100%;
    text-align:center;
    position:relative;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
  }

  .name-input-box::before{
    content:"";
    position:absolute;
    inset:6px;
    border:1px solid rgba(31,28,25,0.12);
    border-radius:2px;
    pointer-events:none;
  }

  .name-input-message{
    font-size:14px;
    color:var(--ink);
    margin-bottom:16px;
  }

  .name-input-box input{
    width:100%;
    padding:10px 12px;
    background:var(--input-bg);
    border:1px solid var(--line);
    border-radius:3px;
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:16px;
    color:var(--ink);
    text-align:center;
    margin-bottom:18px;
  }

  .name-input-box input:focus{
    outline:none;
    border-color:var(--gold);
  }

  .name-input-btn{
    padding:10px 32px;
    background:var(--hanko);
    color:var(--washi);
    border:none;
    border-radius:3px;
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:14px;
    font-weight:600;
    letter-spacing:0.05em;
    cursor:pointer;
    transition:background 0.2s ease;
  }

  .name-input-btn:hover{
    background:var(--hanko-deep);
  }

  .result-rank-badge{
    display:none;
    margin:10px auto 0;
    max-width:280px;
    padding:8px 14px;
    background:var(--hanko);
    color:var(--washi);
    border-radius:3px;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.05em;
    text-align:center;
  }

  .result-rank-badge.visible{
    display:block;
  }

  .high-score-label{
    font-size:12px;
    color:var(--ink-soft);
    opacity:0.8;
  }

  .setup-high-score{
    text-align:center;
    margin-bottom:16px;
  }

  .result-high-score{
    margin-bottom:14px;
  }

  .new-record-badge{
    display:none;
    margin:10px auto 0;
    max-width:280px;
    padding:8px 14px;
    background:var(--gold);
    color:var(--washi);
    border-radius:3px;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.05em;
    text-align:center;
  }

  .new-record-badge.visible{
    display:block;
  }

  .retry-btn{
    padding:12px 36px;
    background:transparent;
    border:1.5px solid var(--ink);
    border-radius:3px;
    font-family:'BIZ UDPGothic', sans-serif;
    font-size:15px;
    color:var(--ink);
    cursor:pointer;
  }

  .retry-btn:hover{
    background:var(--ink);
    color:var(--washi);
  }

  @media (max-width:560px){
    .menu-bar{
      padding:10px 14px;
      gap:8px;
    }
    .menu-title{
      font-size:17px;
    }
    .player-name-label{
      font-size:12px;
    }
    .switch-player-btn{
      padding:5px 10px;
      font-size:11px;
    }
    .menu-auth{
      gap:6px;
    }
  }

  @media (max-width:480px){
    body{padding:24px 10px;}
    body.game-active{padding:10px 10px;}
    .panel{padding:18px 14px;}
    .menu-bar{padding:8px 12px;}
    .menu-title{font-size:16px;}

    .mode-btn{font-size:12px;padding:9px 6px;}
    .level-btn{font-size:12px;padding:10px 6px;}
    .level-btn .sub{font-size:9px;}
    .start-btn{font-size:13px;padding:10px 18px;}

    .status-title{font-size:15px;}
    .search-spinner{width:32px;height:32px;}
    .search-count{font-size:16px;}
    .countdown-number{font-size:64px;}

    .hud{font-size:11px;}
    .word-eyebrow{font-size:10px;}
    #word-display{font-size:26px;}
    #typing-input{font-size:16px;padding:12px 14px;}
    .hint{font-size:10px;}

    .result-title{font-size:12px;}
    .result-score{font-size:44px;}
    .result-sub{font-size:11px;}
    .stat-value{font-size:17px;}
    .stat-label{font-size:9px;}
    .retry-btn{font-size:13px;padding:10px 24px;}
  }
</style>
</head>
<body>
<div class="stage">
  <div class="menu-bar" id="site-header">
    <div class="menu-title">シンプルタイピング</div>
    <div class="menu-auth">
      <span class="player-name-label" id="current-player-label"></span>
      <button class="switch-player-btn" id="google-login-btn"><i class="fab fa-google"></i> ログイン</button>
      <div id="google-btn-container" class="google-btn-container"></div>
      <button class="switch-player-btn hidden" id="logout-btn"><i class="fas fa-right-from-bracket"></i> ログアウト</button>
    </div>
  </div>

  <div class="panel">

<script>
const customAlertOverlayEl = document.getElementById("custom-alert-overlay");
const customAlertMessageEl = document.getElementById("custom-alert-message");
const customAlertBtnEl = document.getElementById("custom-alert-btn");

function showCustomAlert(message){
  customAlertMessageEl.textContent = message;
  customAlertOverlayEl.classList.add("visible");
}

customAlertBtnEl.addEventListener("click", () => {
  customAlertOverlayEl.classList.remove("visible");
});

const nameInputOverlayEl = document.getElementById("name-input-overlay");
const nameInputFieldEl = document.getElementById("name-input-field");
const nameInputBtnEl = document.getElementById("name-input-btn");
let nameInputCallback = null;

function normalizePlayerName(raw){
  const trimmed = (raw || "").trim().slice(0, 6);
  return trimmed.length === 0 ? "GUEST" : trimmed;
}

function showNameInputModal(callback){
  nameInputCallback = callback;
  nameInputFieldEl.value = "";
  nameInputOverlayEl.classList.add("visible");
  nameInputFieldEl.focus();
}

function confirmNameInput(){
  const name = normalizePlayerName(nameInputFieldEl.value);
  nameInputOverlayEl.classList.remove("visible");
  if(nameInputCallback){
    const callback = nameInputCallback;
    nameInputCallback = null;
    callback(name);
  }
}

nameInputBtnEl.addEventListener("click", confirmNameInput);
nameInputFieldEl.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    e.preventDefault();
    confirmNameInput();
  }
});

const GOOGLE_CLIENT_ID = "7365893755-eqm3coij6otohorig4bgq4mtoen1q7sf.apps.googleusercontent.com";
const SESSION_TOKEN_KEY = "sessionToken";
const currentPlayerLabelEl = document.getElementById("current-player-label");
const logoutBtnEl = document.getElementById("logout-btn");
const googleLoginBtnEl = document.getElementById("google-login-btn");
const googleBtnContainerEl = document.getElementById("google-btn-container");

let currentPlayerName = null;
let serverHighScores = null;

function getPlayerName(){
  return currentPlayerName;
}

function getSessionToken(){
  return localStorage.getItem(SESSION_TOKEN_KEY);
}

function setSessionToken(token){
  localStorage.setItem(SESSION_TOKEN_KEY, token);
}

function clearSessionToken(){
  localStorage.removeItem(SESSION_TOKEN_KEY);
}

function updatePlayerNameLabel(){
  currentPlayerLabelEl.textContent = currentPlayerName ? currentPlayerName : "";
}

async function loadServerHighScores(token){
  try{
    const res = await fetch(`${RANKING_API_URL}/auth`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "getHighScores", token })
    });
    const data = await res.json();
    serverHighScores = data.highScores || {};
  }catch(e){
    serverHighScores = {};
  }
}

async function showLoggedInUi(name, token){
  currentPlayerName = name;
  await loadServerHighScores(token);
  updatePlayerNameLabel();
  updateSetupHighScore();
  googleLoginBtnEl.classList.add("hidden");
  logoutBtnEl.classList.remove("hidden");
}

function showLoggedOutUi(){
  currentPlayerName = "GUEST";
  serverHighScores = null;
  updatePlayerNameLabel();
  updateSetupHighScore();
  googleLoginBtnEl.classList.remove("hidden");
  logoutBtnEl.classList.add("hidden");
}

async function verifySession(){
  const token = getSessionToken();
  if(!token){
    showLoggedOutUi();
    return;
  }
  try{
    const res = await fetch(`${RANKING_API_URL}/auth`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "verify", token })
    });
    const data = await res.json();
    if(data.valid){
      await showLoggedInUi(data.name, token);
    } else {
      clearSessionToken();
      showLoggedOutUi();
    }
  }catch(e){
    showLoggedOutUi();
  }
}

async function handleGoogleCredential(response){
  let data;
  try{
    const res = await fetch(`${RANKING_API_URL}/auth`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "login", idToken: response.credential })
    });
    data = await res.json();
  }catch(e){
    showCustomAlert("ログインに失敗しました");
    return;
  }
  if(data.error){
    showCustomAlert("ログインに失敗しました");
    return;
  }
  if(data.isNewUser){
    showNameInputModal(async (name) => {
      let regData;
      try{
        const regRes = await fetch(`${RANKING_API_URL}/auth`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "register", pendingToken: data.pendingToken, name })
        });
        regData = await regRes.json();
      }catch(e){
        showCustomAlert("登録に失敗しました");
        return;
      }
      if(regData.token){
        setSessionToken(regData.token);
        await showLoggedInUi(regData.name, regData.token);
      } else {
        showCustomAlert("登録に失敗しました");
      }
    });
  } else {
    setSessionToken(data.token);
    await showLoggedInUi(data.name, data.token);
  }
}

function initGoogleSignIn(){
  if(!window.google || !google.accounts || !google.accounts.id) return;
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleCredential
  });
  google.accounts.id.renderButton(googleBtnContainerEl, { theme: "outline", size: "large", text: "signin_with", locale: "ja" });
}

googleLoginBtnEl.addEventListener("click", () => {
  const realBtn = googleBtnContainerEl.querySelector("div[role=button]");
  if(realBtn){
    realBtn.click();
  }
});

logoutBtnEl.addEventListener("click", () => {
  const token = getSessionToken();
  clearSessionToken();
  showLoggedOutUi();
  if(token){
    fetch(`${RANKING_API_URL}/auth`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "logout", token })
    }).catch(() => {});
  }
});

window.addEventListener("load", () => {
  initGoogleSignIn();
  verifySession();
});

function getHighScoreKey(mode, level){
  return `highScore_${mode}_${level}`;
}

function getHighScore(mode, level){
  const key = getHighScoreKey(mode, level);
  if(serverHighScores){
    return serverHighScores[key] || 0;
  }
  const value = localStorage.getItem(key);
  return value ? parseInt(value, 10) : 0;
}

function setHighScore(mode, level, newScore){
  const key = getHighScoreKey(mode, level);
  if(serverHighScores){
    serverHighScores[key] = newScore;
    const token = getSessionToken();
    if(token){
      fetch(`${RANKING_API_URL}/auth`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "setHighScore", token, mode, level, score: newScore })
      }).catch(() => {});
    }
    return;
  }
  localStorage.setItem(key, String(newScore));
}

function updateSetupHighScore(){
  setupHighScoreEl.textContent = `ハイスコア ${getHighScore(currentMode, currentLevel)}`;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, (ch) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  }[ch]));
}

    const entryScore = typeof s === "object" && s !== null ? s.score : s;
    const entryName = typeof s === "object" && s !== null && s.name ? s.name : "GUEST";
    return `<li class="ranking-item${rank <= 3 ? " top3" : ""}"><span class="rank">${rank}位</span><span class="name">${escapeHtml(entryName)}</span><span class="score">${entryScore}</span></li>`;
  }).join("");
  rankingBoxEl.classList.remove("hidden");
}

async function loadRanking(){
  const requestId = ++rankingRequestId;
  const mode = currentMode;
  const level = currentLevel;
  const modeLabel = mode === "sentence" ? "文章" : "ひらがな";
  rankingTitleEl.innerHTML = `<i class="fas fa-trophy"></i> ランキング TOP20（${modeLabel}・${levelLabels[level]}）`;
  rankingBoxEl.classList.add("hidden");
  rankingListEl.innerHTML = "";
  try{
    const res = await fetch(`${RANKING_API_URL}/ranking?mode=${mode}&level=${level}`);
    if(requestId !== rankingRequestId) return;
    if(!res.ok){
      rankingBoxEl.classList.add("hidden");
      rankingListEl.innerHTML = "";
      return;
    }
    const scores = await res.json();
    if(requestId !== rankingRequestId) return;
    renderRanking(scores);
  }catch(e){
    if(requestId !== rankingRequestId) return;
    rankingBoxEl.classList.add("hidden");
    rankingListEl.innerHTML = "";
  }
}

async function submitScoreToRanking(score, mode, level, name){
  try{
    const res = await fetch(`${RANKING_API_URL}/ranking?mode=${mode}&level=${level}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ score, name })
    });
    if(!res.ok) return;
    const data = await res.json();
    if(mode === currentMode && level === currentLevel){
      renderRanking(data.top20);
    }
    if(data.rank){
      resultRankBadgeEl.innerHTML = `<i class="fas fa-trophy"></i> ランキング ${data.rank}位にランクインしました！`;
      resultRankBadgeEl.classList.add("visible");
    }
  }catch(e){
  }
}

async function checkRankQualifies(score, mode, level){
  try{
    const res = await fetch(`${RANKING_API_URL}/ranking?mode=${mode}&level=${level}`);
    if(!res.ok) return true;
    const scores = await res.json();
    if(!Array.isArray(scores)) return true;
    if(scores.length < RANKING_DISPLAY_MAX) return true;
    const lowestEntry = scores[scores.length - 1];
    const lowestScore = typeof lowestEntry === "object" && lowestEntry !== null ? lowestEntry.score : lowestEntry;
    return score >= lowestScore;
  }catch(e){
    return true;
  }
}

async function handleRankingSubmission(score, mode, level){
  const qualifies = await checkRankQualifies(score, mode, level);
  if(!qualifies) return;
  const name = normalizePlayerName(getPlayerName());
  submitScoreToRanking(score, mode, level, name);
}

loadRanking();


let ws = null;
let matchId = null;
let myRole = null;
let isOnlineMode = false;
let onlineWordDeck = [];
let onlineIndex = 0;
let onlineScore = 0;
let onlineMiss = 0;
let onlineChars = 0;
let opponentScore = 0;
let searchCountdownTimer = null;
let onlineTimerId = null;
let onlineTimeLeft = 100;
let countdownTimerId = null;

function fitSpacerToViewport(){
  imeSpacerEl.style.height = "0px";
  requestAnimationFrame(() => {
    const contentHeight = document.documentElement.scrollHeight;
    const available = window.innerHeight - contentHeight;
    imeSpacerEl.style.height = `${Math.max(0, available)}px`;
  });
}

window.addEventListener("resize", fitSpacerToViewport);
window.addEventListener("resize", fitWordDisplayFontSize);

document.querySelectorAll(".mode-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentMode = btn.dataset.mode;
    currentLevel = "beginner";
    document.querySelectorAll(".levels").forEach(row => {
      row.classList.toggle("hidden", row.dataset.row !== currentMode);
      row.querySelectorAll(".level-btn").forEach((lb, i) => {
        lb.classList.toggle("active", i === 0);
      });
    });
    loadRanking();
    updateUrlHash();
    updateSetupHighScore();
  });
});

document.querySelectorAll(".levels").forEach(row => {
  row.querySelectorAll(".level-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      row.querySelectorAll(".level-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentLevel = btn.dataset.level;
      loadRanking();
      updateUrlHash();
      updateSetupHighScore();
    });
  });
});

function updateUrlHash(){
  if(currentMode === "hiragana" && currentLevel === "beginner"){
    history.replaceState(null, "", window.location.pathname + window.location.search);
  } else {
    window.location.hash = `${currentMode}-${currentLevel}`;
  }
}

function applyStateFromHash(){
  const hash = window.location.hash.replace("#", "");
  const validModes = ["hiragana", "sentence"];
  const validLevels = ["beginner", "intermediate", "advanced"];
  const [mode, level] = hash.split("-");

  if(hash && validModes.includes(mode) && validLevels.includes(level)){
    currentMode = mode;
    currentLevel = level;
  } else {
    currentMode = "hiragana";
    currentLevel = "beginner";
  }

  document.querySelectorAll(".mode-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.mode === currentMode);
  });

  document.querySelectorAll(".levels").forEach(row => {
    row.classList.toggle("hidden", row.dataset.row !== currentMode);
    row.querySelectorAll(".level-btn").forEach(lb => {
      lb.classList.toggle("active", lb.dataset.level === currentLevel);
    });
  });

  loadRanking();
  updateSetupHighScore();
}

applyStateFromHash();
window.addEventListener("hashchange", applyStateFromHash);

document.getElementById("start-btn").addEventListener("click", startGame);
document.getElementById("start-online-btn").addEventListener("click", startOnlineSearch);
cancelSearchBtn.addEventListener("click", cancelSearch);
document.getElementById("retry-btn").addEventListener("click", () => {
  resultEl.classList.remove("visible");
  setupEl.classList.remove("hidden");
});

function startOnlineSearch(){
  setupEl.classList.add("hidden");
  searchingEl.classList.add("visible");
  let secondsLeft = 15;
  searchCountLabelEl.textContent = `残り ${secondsLeft} 秒`;
  ws = new WebSocket(`${ONLINE_SERVER_URL}/lobby?mode=${currentMode}&level=${currentLevel}`);
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if(msg.type === "matched"){
      clearInterval(searchCountdownTimer);
      matchId = msg.matchId;
      myRole = msg.role;
      connectToMatch();
    } else if(msg.type === "timeout"){
      clearInterval(searchCountdownTimer);
      cancelSearch();
      showCustomAlert("対戦相手が見つかりませんでした");
    }
  };
  ws.onerror = () => {
    clearInterval(searchCountdownTimer);
    cancelSearch();
    showCustomAlert("サーバーに接続できませんでした");
  };
  searchCountdownTimer = setInterval(() => {
    secondsLeft--;
    searchCountLabelEl.textContent = `残り ${secondsLeft} 秒`;
    if(secondsLeft <= 0){
      clearInterval(searchCountdownTimer);
    }
  }, 1000);
}

function cancelSearch(){
  if(ws){ ws.close(); ws = null; }
  clearInterval(searchCountdownTimer);
  searchingEl.classList.remove("visible");
  setupEl.classList.remove("hidden");
}

function connectToMatch(){
  if(ws) ws.close();
  ws = new WebSocket(`${ONLINE_SERVER_URL}/match/${matchId}?role=${myRole}&mode=${currentMode}&level=${currentLevel}`);
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if(msg.type === "start"){
      onlineWordDeck = msg.wordDeck;
      startOnlineCountdown();
    } else if(msg.type === "opponentProgress"){
      opponentScore = msg.score;
      updateOpponentHud();
    } else if(msg.type === "end"){
      finishOnlineGame(msg);
    } else if(msg.type === "opponentLeft"){
      finishOnlineGame({
        you:{score:onlineScore, miss:onlineMiss},
        opponent:{score:opponentScore, miss:0},
        result:"win",
        forfeit:true
      });
    }
  };
}

function startOnlineCountdown(){
  searchingEl.classList.remove("visible");
  countdownEl.classList.add("visible");
  let count = 3;
  countdownNumberEl.textContent = count;
  clearInterval(countdownTimerId);
  countdownTimerId = setInterval(() => {
    count--;
    if(count > 0){
      countdownNumberEl.textContent = count;
    } else {
      clearInterval(countdownTimerId);
      countdownEl.classList.remove("visible");
      beginOnlineMatch();
    }
  }, 1000);
}

function beginOnlineMatch(){
  isOnlineMode = true;
  onlineIndex = 0;
  onlineScore = 0;
  onlineMiss = 0;
  onlineChars = 0;
  opponentScore = 0;
  onlineTimeLeft = 100;
  gameEl.classList.add("visible");
  headerEl.classList.add("hidden");
  document.body.classList.add("game-active");
  opponentScoreLabelEl.classList.remove("hidden");
  endGameBtn.classList.add("hidden");
  const modeLabel = currentMode === "sentence" ? "文章" : "ひらがな";
  levelLabelEl.textContent = `${modeLabel}・${levelLabels[currentLevel]}（オンライン）`;
  scoreLabelEl.textContent = `せいかい 0 もん`;
  timeLabelEl.textContent = `残り 100 秒`;
  timerFillEl.style.width = "100%";
  updateOpponentHud();
  currentWord = onlineWordDeck[0];
  renderWord();
  inputEl.value = "";
  inputEl.classList.remove("shake");
  hintLabelEl.textContent = "Enterで確定";
  fitSpacerToViewport();
  inputEl.focus();
  clearInterval(onlineTimerId);
  onlineTimerId = setInterval(() => {
    onlineTimeLeft--;
    timeLabelEl.textContent = `残り ${onlineTimeLeft} 秒`;
    timerFillEl.style.width = `${(onlineTimeLeft / 100) * 100}%`;
    if(onlineTimeLeft <= 0){
      clearInterval(onlineTimerId);
      if(ws && ws.readyState === WebSocket.OPEN){
        ws.send(JSON.stringify({type:"finished", score:onlineScore, miss:onlineMiss}));
      }
    }
  }, 1000);
}

function updateOpponentHud(){
  opponentScoreLabelEl.textContent = `あいて ${opponentScore} もん`;
}

function handleOnlineSubmit(typed){
  if(typed !== currentWord){
    onlineMiss++;
    hintLabelEl.textContent = "まだ違います";
    shakeInput();
    playSound(incorrectSoundEl);
    return;
  }
  onlineScore++;
  onlineChars += currentWord.length;
  onlineIndex++;
  currentWord = onlineWordDeck[onlineIndex % onlineWordDeck.length];
  scoreLabelEl.textContent = `せいかい ${onlineScore} もん`;
  renderWord();
  inputEl.value = "";
  inputEl.classList.remove("shake");
  hintLabelEl.textContent = "Enterで確定";
  fitSpacerToViewport();
  playSound(correctSoundEl);
  if(ws && ws.readyState === WebSocket.OPEN){
    ws.send(JSON.stringify({type:"progress", score:onlineScore, index:onlineIndex}));
  }
}

function finishOnlineGame(msg){
  clearInterval(onlineTimerId);
  clearInterval(countdownTimerId);
  countdownEl.classList.remove("visible");
  isOnlineMode = false;
  gameEl.classList.remove("visible");
  headerEl.classList.remove("hidden");
  document.body.classList.remove("game-active");
  opponentScoreLabelEl.classList.add("hidden");
  endGameBtn.classList.remove("hidden");
  resultEl.classList.add("visible");
  const you = msg.you;
  const opponent = msg.opponent;
  const attempts = you.score + you.miss;
  const accuracy = attempts === 0 ? 0 : Math.round((you.score / attempts) * 100);
  const speed = Math.round((onlineChars / 100) * 60);
  let resultLabel = "ひきわけ";
  if(msg.result === "win") resultLabel = msg.forfeit ? "不戦勝" : "しょうり";
  else if(msg.result === "lose") resultLabel = "はいせん";
  resultScoreEl.textContent = resultLabel;
  const modeLabel = currentMode === "sentence" ? "文章" : "ひらがな";
  resultSubEl.textContent = `${modeLabel}・${levelLabels[currentLevel]}（オンライン）/ あなた ${you.score}もん・あいて ${opponent.score}もん`;
  statAccuracyEl.textContent = `${accuracy}%`;
  statSpeedEl.textContent = speed;
  statMissEl.textContent = you.miss;
  if(ws){ ws.close(); ws = null; }
}

function pickWord(){
  const pool = wordBank[currentMode][currentLevel];
  let candidates = pool.filter(w => !usedWords.includes(w));
  if(candidates.length === 0){
    usedWords = [];
    candidates = pool;
  }
  const word = candidates[Math.floor(Math.random() * candidates.length)];
  usedWords.push(word);
  return word;
}

function renderWord(){
  wordDisplayEl.innerHTML = currentWord.split("").map(c => `<span class="char">${c}</span>`).join("");
  fitWordDisplayFontSize();
}

function fitWordDisplayFontSize(){
  const baseSize = parseFloat(getComputedStyle(wordDisplayEl).fontSize);
  const minSize = 12;
  let size = baseSize;
  wordDisplayEl.style.fontSize = "";
  while(wordDisplayEl.scrollWidth > wordDisplayEl.clientWidth && size > minSize){
    size -= 1;
    wordDisplayEl.style.fontSize = `${size}px`;
  }
}

function updateProgressHighlight(typed){
  const chars = wordDisplayEl.querySelectorAll(".char");
  let stillCorrect = true;
  chars.forEach((el, i) => {
    if(stillCorrect && i < typed.length && typed[i] === currentWord[i]){
      el.classList.add("done");
    } else {
      stillCorrect = false;
      el.classList.remove("done");
    }
  });
}

function nextWord(){
  currentWord = pickWord();
  renderWord();
  inputEl.value = "";
  inputEl.classList.remove("shake");
  hintLabelEl.textContent = "Enterで確定";
  fitSpacerToViewport();
}

function startGame(){
  setupEl.classList.add("hidden");
  resultEl.classList.remove("visible");
  gameEl.classList.add("visible");
  headerEl.classList.add("hidden");
  document.body.classList.add("game-active");
  endGameBtn.classList.remove("hidden");
  fitSpacerToViewport();
  const modeLabel = currentMode === "sentence" ? "文章" : "ひらがな";
  levelLabelEl.textContent = `${modeLabel}・${levelLabels[currentLevel]}`;
  score = 0;
  missCount = 0;
  totalCharsTyped = 0;
  timeLeft = 100;
  usedWords = [];
  resultRankBadgeEl.classList.remove("visible");
  resultRankBadgeEl.textContent = "";
  newRecordBadgeEl.classList.remove("visible");
  scoreLabelEl.textContent = `せいかい 0 もん`;
  timeLabelEl.textContent = `残り 100 秒`;
  timerFillEl.style.width = "100%";
  nextWord();
  inputEl.focus();
  clearInterval(timerId);
  timerId = setInterval(() => {
    timeLeft--;
    timeLabelEl.textContent = `残り ${timeLeft} 秒`;
    timerFillEl.style.width = `${(timeLeft / 100) * 100}%`;
    if(timeLeft <= 0){
      endGame(true);
    }
  }, 1000);
}

function endGame(isNormalEnd){
  clearInterval(timerId);
  gameEl.classList.remove("visible");
  headerEl.classList.remove("hidden");
  document.body.classList.remove("game-active");
  if(isNormalEnd){
    resultEl.classList.add("visible");

    const attempts = score + missCount;
    const accuracy = attempts === 0 ? 0 : Math.round((score / attempts) * 100);
    const speed = Math.round((totalCharsTyped / 100) * 60);
    const finalScore = Math.max(0, Math.round(score * 100 + speed * 2 - missCount * 30));

    resultScoreEl.textContent = finalScore;
    const modeLabel = currentMode === "sentence" ? "文章" : "ひらがな";
    resultSubEl.textContent = `${modeLabel}・${levelLabels[currentLevel]} / ${score}もん せいかい`;
    statAccuracyEl.textContent = `${accuracy}%`;
    statSpeedEl.textContent = speed;
    statMissEl.textContent = missCount;

    const previousHighScore = getHighScore(currentMode, currentLevel);
    if(finalScore > previousHighScore){
      setHighScore(currentMode, currentLevel, finalScore);
      resultHighScoreEl.textContent = `ハイスコア ${finalScore}`;
      newRecordBadgeEl.classList.add("visible");
    } else {
      resultHighScoreEl.textContent = `ハイスコア ${previousHighScore}`;
      newRecordBadgeEl.classList.remove("visible");
    }
    updateSetupHighScore();

    if(finalScore > 0){
      handleRankingSubmission(finalScore, currentMode, currentLevel);
    }
  } else {
    setupEl.classList.remove("hidden");
  }
}

const endGameBtn = document.getElementById("end-game-btn");
endGameBtn.addEventListener("click", () => {
  if(isOnlineMode) return;
  endGame(false);
});

document.addEventListener("keydown", (e) => {
  if(e.key === "Escape" && gameEl.classList.contains("visible")){
    if(isOnlineMode) return;
    endGame(false);
  }
});

function shakeInput(){
  inputEl.classList.remove("shake");
  void inputEl.offsetWidth;
  inputEl.classList.add("shake");
}

inputEl.addEventListener("compositionstart", () => { isComposing = true; });
inputEl.addEventListener("compositionend", () => {
  setTimeout(() => { isComposing = false; }, 0);
});

inputEl.addEventListener("input", () => {
  updateProgressHighlight(inputEl.value);
  inputEl.classList.remove("shake");
  hintLabelEl.textContent = "Enterで確定";
});

inputEl.addEventListener("keydown", (e) => {
  if(e.key !== "Enter") return;
  if(isComposing || e.isComposing || e.keyCode === 229) return;
  e.preventDefault();

  const typed = inputEl.value.trim();

  if(isOnlineMode){
    handleOnlineSubmit(typed);
    return;
  }

  if(typed !== currentWord){
    missCount++;
    hintLabelEl.textContent = "まだ違います";
    shakeInput();
    playSound(incorrectSoundEl);
    return;
  }

  score++;
  totalCharsTyped += currentWord.length;
  scoreLabelEl.textContent = `せいかい ${score} もん`;
  playSound(correctSoundEl);
  nextWord();
});
</script>
